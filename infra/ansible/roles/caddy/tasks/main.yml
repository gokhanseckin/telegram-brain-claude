---
# ── Install Caddy from official repo ────────────────────────────────────────────

- name: Add Caddy APT signing key
  apt_key:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    state: present

- name: Add Caddy APT repository
  apt_repository:
    repo: "deb https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    state: present
    filename: caddy-stable

- name: Update apt cache after adding Caddy repo
  apt:
    update_cache: true

- name: Install Caddy
  apt:
    name: caddy
    state: present

# ── Write Caddyfile ──────────────────────────────────────────────────────────────

- name: Write /etc/caddy/Caddyfile
  copy:
    dest: /etc/caddy/Caddyfile
    content: |
      mcp.{{ tbc_domain }} {
          reverse_proxy localhost:8000

          # Security headers
          header {
              Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
              X-Content-Type-Options "nosniff"
              X-Frame-Options "DENY"
          }

          # Access log for debugging
          log {
              output file /var/log/caddy/mcp-access.log
              format json
          }
      }
    owner: root
    group: root
    mode: "0644"
  notify: Reload Caddy

- name: Ensure Caddy log directory exists
  file:
    path: /var/log/caddy
    state: directory
    owner: caddy
    group: caddy
    mode: "0755"

- name: Enable and start Caddy
  systemd:
    name: caddy
    enabled: true
    state: started
