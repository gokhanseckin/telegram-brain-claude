---
# ── Floating IP (Hetzner requires manual OS-level config) ──────────────────────

- name: Configure floating IP via netplan
  copy:
    dest: /etc/netplan/60-floating-ip.yaml
    content: |
      network:
        version: 2
        ethernets:
          eth0:
            addresses:
              - {{ floating_ip }}/32
    owner: root
    group: root
    mode: "0600"
  notify: Apply netplan

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
      - ufw
      - fail2ban
      - unattended-upgrades
      - age
    state: present

# ── System user ────────────────────────────────────────────────────────────────

- name: Create tbc system group
  group:
    name: tbc
    system: true
    state: present

- name: Create tbc system user
  user:
    name: tbc
    group: tbc
    home: /var/lib/tbc
    create_home: true
    system: true
    shell: /usr/sbin/nologin
    state: present

- name: Create /etc/tbc directory for env file
  file:
    path: /etc/tbc
    state: directory
    owner: tbc
    group: tbc
    mode: "0700"

- name: Create placeholder env file if not present
  copy:
    dest: /etc/tbc/env
    content: |
      # Secrets for TBC services — fill in before starting units
      # TELEGRAM_API_ID=
      # TELEGRAM_API_HASH=
      # TELEGRAM_BOT_TOKEN=
      # ANTHROPIC_API_KEY=
      # DATABASE_URL=postgresql://tbc@localhost/tbc
      # OLLAMA_BASE_URL=http://127.0.0.1:11434
    owner: tbc
    group: tbc
    mode: "0600"
    force: false   # never overwrite if secrets are already filled in

# ── Firewall (ufw) ──────────────────────────────────────────────────────────────

- name: Set ufw default incoming policy to deny
  ufw:
    default: deny
    direction: incoming

- name: Set ufw default outgoing policy to allow
  ufw:
    default: allow
    direction: outgoing

- name: Allow SSH from admin IP
  ufw:
    rule: allow
    port: "22"
    proto: tcp
    src: "{{ admin_ip }}"
    comment: "Admin SSH"

- name: Allow HTTPS from Anthropic IP ranges (MCP)
  ufw:
    rule: allow
    port: "443"
    proto: tcp
    src: "{{ item }}"
    comment: "HTTPS Anthropic MCP"
  loop:
    - "160.79.104.0/23"
    - "2607:6bc0::/48"

- name: Enable ufw
  ufw:
    state: enabled

# ── fail2ban ───────────────────────────────────────────────────────────────────

- name: Write fail2ban jail.local with sshd jail
  copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime  = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled  = true
      port     = 22
      logpath  = %(sshd_log)s
      backend  = %(sshd_backend)s
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  systemd:
    name: fail2ban
    enabled: true
    state: started

# ── Unattended upgrades ────────────────────────────────────────────────────────

- name: Configure unattended-upgrades (enable security updates)
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: "0644"
