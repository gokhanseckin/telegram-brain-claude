all:
  children:
    tbc:
      hosts:
        tbc-prod:
          ansible_host: "{{ lookup('env', 'TBC_VPS_IP') | default('REPLACE_WITH_VPS_IP') }}"
          ansible_user: root
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
          tbc_domain: "REPLACE_WITH_YOUR_DOMAIN"
          admin_ip: "REPLACE_WITH_YOUR_IP/32"
          backup_sftp_host: "REPLACE_WITH_STORAGE_BOX_HOST"
          backup_sftp_user: "REPLACE_WITH_STORAGE_BOX_USER"
          backup_sftp_pass: "REPLACE_WITH_STORAGE_BOX_PASS"
