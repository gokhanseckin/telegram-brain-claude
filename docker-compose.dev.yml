services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tbc
      POSTGRES_PASSWORD: tbc
      POSTGRES_DB: tbc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tbc"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
