[project]
name = "tbc-common"
version = "0.1.0"
description = "Shared library for Telegram Business Brain services."
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0.30",
    "alembic>=1.13.0",
    "httpx>=0.27.0",
    "psycopg[binary]>=3.2.0",
    "pgvector>=0.3.0",
    "pydantic>=2.8.0",
    "pydantic-settings>=2.4.0",
    "structlog>=24.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tbc_common"]
